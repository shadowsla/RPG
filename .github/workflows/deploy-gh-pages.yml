# =========================================
# Ultimate Tower RPG - deploy-gh-pages.yml
# GitHub Actions Deployment Workflow
# =========================================

name: Deploy To GitHub Pages

# =========================================
# Trigger
# =========================================

on:

  push:

    branches:
      - main

  workflow_dispatch:

# =========================================
# Permissions
# =========================================

permissions:

  contents: read

  pages: write

  id-token: write

# =========================================
# Prevent Multiple Deploys
# =========================================

concurrency:

  group: "pages"

  cancel-in-progress: true

# =========================================
# Jobs
# =========================================

jobs:

  # =======================================
  # Build Job
  # =======================================

  build:

    runs-on: ubuntu-latest

    steps:

      # ===================================
      # Checkout
      # ===================================

      - name: Checkout Repository

        uses: actions/checkout@v4

      # ===================================
      # Setup Node
      # ===================================

      - name: Setup Node.js

        uses: actions/setup-node@v4

        with:

          node-version: 20

          cache: npm

      # ===================================
      # Install Dependencies
      # ===================================

      - name: Install Dependencies

        run: npm install

      # ===================================
      # Build Project
      # ===================================

      - name: Build Game

        run: npm run build

      # ===================================
      # Upload Artifact
      # ===================================

      - name: Upload Pages Artifact

        uses: actions/upload-pages-artifact@v3

        with:

          path: ./dist

  # =======================================
  # Deploy Job
  # =======================================

  deploy:

    environment:

      name: github-pages

      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    needs: build

    steps:

      # ===================================
      # Deploy
      # ===================================

      - name: Deploy To GitHub Pages

        id: deployment

        uses: actions/deploy-pages@v4